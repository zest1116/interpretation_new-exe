# .github/workflows/release.yml

name: Build & Release

on:
  push:
    tags: ['v*']

# 환경 변수
env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: windows-latest

    # ── 환경 결정 ──
    # v0.2.108-dev → Development, v0.2.108-qa → QA, v0.2.108 → Production
    env:
      APP_ENV: >-
        ${{ contains(github.ref_name, '-dev') && 'Development' ||
            contains(github.ref_name, '-qa') && 'QA' ||
            'Production' }}
    steps:
      # ─────────────────────────────────────────
      #  준비
      # ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WiX v4
        run: dotnet tool install --global wix

      # 태그에서 버전 추출: v0.2.108-dev → 0.2.108
      - name: Extract version
        id: ver
        run: |
          $raw = "${{ github.ref_name }}"
          $ver = $raw -replace '^v' -replace '-dev$' -replace '-qa$'
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "VERSION4=$ver.0" >> $env:GITHUB_OUTPUT
          echo "Extracted version: $ver"

      # ─────────────────────────────────────────
      #  빌드
      # ─────────────────────────────────────────
      - name: Build MSI
        run: |
          .\Scripts\build.ps1 `
            -Version ${{ steps.ver.outputs.VERSION }} `
            -Environment ${{ env.APP_ENV }} `
            -BuildMsi
            
      # ─────────────────────────────────────────
      #  결과물 확인
      # ─────────────────────────────────────────
      - name: Verify outputs
        id: outputs
        run: |
          $msi = Get-ChildItem "releases\*.msi" | Select-Object -First 1
          $hash = Get-Content "releases\*.sha256" -Raw
          echo "MSI_NAME=$($msi.Name)" >> $env:GITHUB_OUTPUT
          echo "MSI_PATH=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          echo "MSI_SIZE=$($msi.Length)" >> $env:GITHUB_OUTPUT
          echo "SHA256=$($hash.Split(' ')[0])" >> $env:GITHUB_OUTPUT
          echo "MSI: $($msi.Name) ($([math]::Round($msi.Length/1MB, 1)) MB)"
          echo "SHA256: $($hash.Split(' ')[0])"
